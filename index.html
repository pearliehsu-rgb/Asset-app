<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>個人資產管理</title>
<style>
:root{
  --ink:#1c2733; --ink-soft:#5b6875; --line:#e2e6ea; --bg:#f5f6f8; --card:#ffffff;
  --accent:#0f6f6a; --accent-soft:#e3f1f0; --danger:#b4421f; --danger-soft:#fbeae3;
  --pos:#1c7a3d; --warn-bg:#fdf3e0; --warn-ink:#8a5a00;
  --radius:10px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{font-size:16px;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.55; padding-bottom:60px;
}
.num{font-variant-numeric:tabular-nums;}
header.app{
  background:var(--card); border-bottom:1px solid var(--line);
  padding:14px 18px 0; position:sticky; top:0; z-index:20;
}
header.app h1{font-size:1.05rem; font-weight:700; letter-spacing:.04em;}
header.app .sub{font-size:.75rem; color:var(--ink-soft); margin-top:2px;}
nav.tabs{display:flex; gap:2px; overflow-x:auto; margin-top:10px; -webkit-overflow-scrolling:touch;}
nav.tabs button{
  border:none; background:none; font:inherit; font-size:.85rem; color:var(--ink-soft);
  padding:8px 12px 10px; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent;
}
nav.tabs button.active{color:var(--accent); border-bottom-color:var(--accent); font-weight:600;}
nav.tabs button:focus-visible{outline:2px solid var(--accent); outline-offset:-2px;}
main{max-width:960px; margin:0 auto; padding:16px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
.card h2{font-size:.95rem; font-weight:700; margin-bottom:10px;}
.card h3{font-size:.85rem; font-weight:600; margin:12px 0 6px;}
.grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
@media(max-width:640px){.grid4{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:12px;}
.stat .lbl{font-size:.72rem; color:var(--ink-soft); letter-spacing:.05em;}
.stat .val{font-size:1.15rem; font-weight:700; margin-top:2px;}
.stat.net .val{color:var(--accent);}
.stat.debt .val{color:var(--danger);}
table{width:100%; border-collapse:collapse; font-size:.85rem;}
th,td{padding:7px 8px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top;}
th{font-size:.72rem; color:var(--ink-soft); font-weight:600; letter-spacing:.04em;}
td.r,th.r{text-align:right;}
tr:last-child td{border-bottom:none;}
.tbl-wrap{overflow-x:auto;}
button.btn{
  font:inherit; font-size:.82rem; border:1px solid var(--line); background:var(--card);
  color:var(--ink); border-radius:7px; padding:6px 12px; cursor:pointer;
}
button.btn:hover{border-color:var(--accent); color:var(--accent);}
button.btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
button.btn.primary:hover{opacity:.9; color:#fff;}
button.btn.danger{color:var(--danger);}
button.btn.sm{font-size:.74rem; padding:3px 8px;}
button:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
.row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.row.between{justify-content:space-between;}
.muted{color:var(--ink-soft); font-size:.78rem;}
.badge{display:inline-block; font-size:.68rem; padding:1px 7px; border-radius:99px; background:var(--accent-soft); color:var(--accent);}
.badge.red{background:var(--danger-soft); color:var(--danger);}
.badge.grey{background:#eef0f2; color:var(--ink-soft);}
.banner{background:var(--warn-bg); color:var(--warn-ink); border:1px solid #ecd9ab; border-radius:var(--radius); padding:10px 12px; font-size:.8rem; margin-bottom:14px;}
.banner.ok{background:var(--accent-soft); color:var(--accent); border-color:#bcdedd;}
.tree-group{margin:8px 0 4px; font-weight:600; font-size:.85rem;}
.tree-acc{display:flex; justify-content:space-between; align-items:center; padding:6px 0 6px 14px; border-bottom:1px dashed var(--line); font-size:.85rem;}
.gap-pos{color:var(--pos);}
.gap-neg{color:var(--danger);}
dialog{
  border:none; border-radius:12px; padding:0; max-width:480px; width:calc(100% - 32px);
  box-shadow:0 10px 40px rgba(0,0,0,.18);
}
dialog::backdrop{background:rgba(20,28,36,.45);}
dialog .dlg-head{padding:14px 16px 0; font-weight:700; font-size:.95rem;}
dialog form{padding:12px 16px 16px;}
dialog label{display:block; font-size:.75rem; color:var(--ink-soft); margin:10px 0 3px;}
dialog input,dialog select,dialog textarea{
  width:100%; font:inherit; font-size:.88rem; padding:7px 9px;
  border:1px solid var(--line); border-radius:7px; background:#fff; color:var(--ink);
}
dialog input:focus,dialog select:focus,dialog textarea:focus{outline:2px solid var(--accent); border-color:var(--accent);}
dialog .dlg-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:16px;}
.donut-wrap{display:flex; gap:20px; align-items:center; flex-wrap:wrap;}
.legend{font-size:.8rem;}
.legend div{display:flex; align-items:center; gap:6px; margin:3px 0;}
.legend i{width:10px; height:10px; border-radius:3px; display:inline-block;}
textarea.paste{width:100%; min-height:110px; font:inherit; font-size:.8rem; border:1px solid var(--line); border-radius:7px; padding:8px;}
.import-preview{max-height:300px; overflow:auto; border:1px solid var(--line); border-radius:7px; margin-top:10px;}
.err-cell{background:var(--danger-soft); color:var(--danger);}
input.inline-num{width:110px; font:inherit; font-size:.84rem; padding:4px 7px; border:1px solid var(--line); border-radius:6px; text-align:right;}
input.inline-num:focus{outline:2px solid var(--accent);}
details{margin-top:4px;}
details summary{cursor:pointer; font-size:.8rem; color:var(--accent);}
footer.note{max-width:960px; margin:0 auto; padding:0 16px 24px; font-size:.72rem; color:var(--ink-soft);}
@media (prefers-reduced-motion: reduce){*{transition:none!important; animation:none!important;}}

#saveBtn.dirty{background:var(--danger); border-color:var(--danger); color:#fff; font-weight:600;}
header.app .toprow{display:flex; justify-content:space-between; align-items:center; gap:10px;}

/* 損益顏色：依台灣慣例 紅漲綠跌 */
.pl-up{color:var(--danger); font-weight:600;}
.pl-down{color:var(--pos); font-weight:600;}
body.privacy input.inline-num{filter:blur(6px);}
</style>
</head>
<body>
<header class="app">
  <div class="toprow">
    <div><h1>個人資產管理</h1>
    <div class="sub">資料自動儲存於本機，不經任何伺服器</div></div>
    <span class="row">
      <button class="btn" id="privBtn" style="display:none">遮住金額</button>
      <button class="btn" id="saveBtn" style="display:none">儲存變更</button>
    </span>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>
<main id="main"></main>
<footer class="note">
  資料自動儲存於此瀏覽器本機。建議每週按「備份」把資料文字存一份到備忘錄，作為唯一可靠的保險。
</footer>
<dialog id="dlg">
  <div class="dlg-head" id="dlgTitle"></div>
  <form id="dlgForm" method="dialog"></form>
</dialog>
<script>
"use strict";
/* ============ 基本工具 ============ */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => (window.crypto && crypto.randomUUID ? crypto.randomUUID() : "id-" + Date.now() + "-" + Math.random().toString(36).slice(2));
const todayStr = () => new Date().toISOString().slice(0,10);
const fmt0 = new Intl.NumberFormat("zh-TW", {maximumFractionDigits:0});
const fmt2 = new Intl.NumberFormat("zh-TW", {maximumFractionDigits:2});
const fmtN = (n, d) => PRIVACY ? "＊＊＊" : ((n===null||n===undefined||isNaN(n)) ? "—" : (d===2?fmt2:fmt0).format(n));
const pct1 = n => (n===null||isNaN(n)) ? "—" : (Math.round(n*10)/10).toFixed(1) + "%";

const MARKETS = ["TW","US","EU","CRYPTO","OTHER"];
const INSTR_TYPES = [["stock","個股"],["etf","ETF"],["crypto","加密貨幣"],["other","其他"]];
const instrKey = (market, symbol) => (market||"").toUpperCase().trim() + ":" + (symbol||"").toUpperCase().trim();
const SCHEMA_VERSION = 3;
const SNAPSHOT_KEY = "asset_tracker_snapshot_v1";
const LASTBK_KEY = "asset_tracker_last_backup_v1";
let PRIVACY = false; // 隱私模式：遮住所有金額（僅本次開啟有效，不寫入資料檔）

/* ============ 記憶體資料層（檔案為主，localStorage 僅作未儲存變更的臨時快取） ============ */
const S = {groups:[], accounts:[], instruments:[], positions:[], transactions:[], etf:[], targets:[], fx:[], snapshots:[],
           settings:null, meta:null, dirty:false, started:false, loadedFileName:null, persisted:null};
const STORE_MAP = {groups:"groups", accounts:"accounts", instruments:"instruments",
  positions:"positions", transactions:"transactions", etfConstituents:"etf", targets:"targets", fxRates:"fx"};
const STORES = Object.keys(STORE_MAP).concat(["settings","meta"]);

function markDirty(){
  S.dirty = true; updateSaveUI();
  try{ localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(serializeAll())); }catch(e){ /* 快取失敗不影響主流程 */ }
}
async function dbPut(store, obj){
  if(store === "settings") S.settings = obj;
  else if(store === "meta") S.meta = obj;
  else{
    const arr = S[STORE_MAP[store]];
    const i = arr.findIndex(x => x.id === obj.id);
    if(i >= 0) arr[i] = obj; else arr.push(obj);
  }
  markDirty();
}
async function dbPutMany(store, objs){ for(const o of objs){ await dbPut(store, o); } }
async function dbDelete(store, id){
  const key = STORE_MAP[store];
  if(key) S[key] = S[key].filter(x => x.id !== id);
  markDirty();
}
async function dbClear(store){
  if(store === "settings") S.settings = null;
  else if(store === "meta") S.meta = null;
  else S[STORE_MAP[store]] = [];
  markDirty();
}

/* 交易 → 持倉：以加權平均成本法，由交易明細重算各部位 */
function rebuildPositions(){
  const groups = new Map();
  for(const tx of S.transactions){
    const k = tx.accountId + "|" + tx.instrumentId;
    if(!groups.has(k)) groups.set(k, []);
    groups.get(k).push(tx);
  }
  const out = [];
  for(const [k, txs] of groups){
    txs.sort((a,b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    let qty = 0, cost = 0;
    for(const tx of txs){
      const q = Number(tx.quantity) || 0, pr = Number(tx.price) || 0;
      if(tx.side === "sell"){
        const avg = qty > 0 ? cost / qty : 0;
        cost -= avg * q; qty -= q;
        if(qty <= 1e-9){ qty = 0; cost = 0; }
      }else{
        qty += q; cost += q * pr;
      }
    }
    if(qty > 1e-9){
      const sep = k.indexOf("|");
      out.push({id:k, accountId:k.slice(0, sep), instrumentId:k.slice(sep+1), quantity:qty, totalCost:cost});
    }
  }
  S.positions = out;
}
async function putTx(tx){
  const i = S.transactions.findIndex(x => x.id === tx.id);
  if(i >= 0) S.transactions[i] = tx; else S.transactions.push(tx);
  rebuildPositions(); markDirty();
}
async function delTx(id){
  S.transactions = S.transactions.filter(x => x.id !== id);
  rebuildPositions(); markDirty();
}

async function loadAll(){
  S.groups.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  S.accounts.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
}
function serializeAll(){
  return {schema_version:SCHEMA_VERSION, saved_at:new Date().toISOString(),
    groups:S.groups, accounts:S.accounts, instruments:S.instruments, positions:S.positions,
    transactions:S.transactions, etfConstituents:S.etf, targets:S.targets, fxRates:S.fx, snapshots:S.snapshots, settings:S.settings, meta:S.meta};
}
function deserializeAll(d){
  if(!d || !d.schema_version || !Array.isArray(d.accounts)) throw new Error("檔案格式不符（不是本 App 的資料檔）");
  if(d.schema_version > SCHEMA_VERSION) throw new Error("此資料檔來自較新版本的 App");
  S.groups = d.groups||[]; S.accounts = d.accounts||[]; S.instruments = d.instruments||[];
  S.positions = d.positions||[]; S.transactions = d.transactions||[]; S.etf = d.etfConstituents||[]; S.targets = d.targets||[];
  S.fx = d.fxRates||[]; S.snapshots = d.snapshots||[]; S.settings = d.settings || {id:"app", baseCurrency:"TWD", thresholdPct:5};
  S.meta = d.meta || {id:"schema", version:SCHEMA_VERSION};
  migratePositions();
  // 無交易但有舊持倉 → 每個持倉轉成一筆初始買入交易
  if(S.transactions.length === 0 && S.positions.length > 0){
    for(const p of S.positions){
      const q = Number(p.quantity) || 0;
      if(q <= 0) continue;
      const price = (p.totalCost != null && !isNaN(p.totalCost) && q > 0) ? p.totalCost / q : 0;
      const ins = S.instruments.find(i => i.id === p.instrumentId);
      S.transactions.push({id:uid(), accountId:p.accountId, instrumentId:p.instrumentId, side:"buy",
        quantity:q, price:price, date:(ins && ins.lastPriceDate) || todayStr(), note:"初始持倉（自動轉入）"});
    }
  }
  rebuildPositions();
}
async function seedDefaults(){
  const G = (cat,name,so)=>({id:uid(),categoryId:cat,name,sortOrder:so});
  const g = {
    longDebt:G("liability","長期負債",1), shortDebt:G("liability","短期負債",2),
    cash:G("equity","現金",10), stock:G("equity","股票",11), estate:G("equity","房地產",12),
    insure:G("equity","保單價值",13), cryptoG:G("equity","虛擬貨幣",14), otherInv:G("equity","其他投資",15)
  };
  const A = (gid,name,cur,kind,so)=>({id:uid(),groupId:gid,name,currency:cur,kind,balance:0,note:"",sortOrder:so});
  S.groups = Object.values(g);
  S.accounts = [
    A(g.longDebt.id,"房貸","TWD","balance",1),
    A(g.shortDebt.id,"信用卡費","TWD","balance",1),
    A(g.cash.id,"生活費","TWD","balance",1), A(g.cash.id,"房貸準備金","TWD","balance",2),
    A(g.stock.id,"台股現金","TWD","balance",1), A(g.stock.id,"台股持倉","TWD","holding",2),
    A(g.stock.id,"美股現金","USD","balance",3), A(g.stock.id,"美股持倉","USD","holding",4),
    A(g.stock.id,"歐股現金","EUR","balance",5), A(g.stock.id,"歐股持倉","EUR","holding",6)];
  S.instruments = []; S.positions = []; S.transactions = []; S.etf = []; S.targets = []; S.snapshots = [];
  S.fx = [{id:"TWD", rateToBase:1, updatedAt:todayStr()}];
  S.settings = {id:"app", baseCurrency:"TWD", thresholdPct:5, autoFetchTwse:true};
  S.meta = {id:"schema", version:SCHEMA_VERSION, createdAt:todayStr()};
}


function migratePositions(){
  for(const p of S.positions){
    if(Object.prototype.hasOwnProperty.call(p, "avgCost")){
      if(p.totalCost === undefined || p.totalCost === null){
        const ac = Number(p.avgCost), q = Number(p.quantity) || 0;
        p.totalCost = (p.avgCost === null || p.avgCost === "" || isNaN(ac)) ? null : ac * q;
      }
      delete p.avgCost;
    }
  }
}

/* ============ 計算 ============ */
function fxRate(code){
  if(!code) return null;
  if(code === S.settings.baseCurrency) return 1;
  const r = S.fx.find(f => f.id === code);
  return (r && isFinite(r.rateToBase) && r.rateToBase > 0) ? r.rateToBase : null;
}
function toBase(amount, code, missing){
  if(!amount) return 0; // 金額為 0 無需換匯，不觸發缺匯率警告
  const r = fxRate(code);
  if(r === null){ if(missing) missing.add(code); return 0; }
  return amount * r;
}
function accountBase(acc, missing){
  if(acc.kind === "balance") return toBase(Number(acc.balance)||0, acc.currency, missing);
  let sum = 0;
  for(const p of S.positions.filter(p => p.accountId === acc.id)){
    const ins = S.instruments.find(i => i.id === p.instrumentId);
    if(!ins) continue;
    const v = (Number(p.quantity)||0) * (Number(ins.lastPrice)||0);
    sum += toBase(v, ins.currency, missing);
  }
  return sum;
}
function totals(){
  const missing = new Set();
  let debt = 0, equity = 0;
  const groupTotals = {};
  for(const g of S.groups){
    let gt = 0;
    for(const a of S.accounts.filter(a => a.groupId === g.id)) gt += accountBase(a, missing);
    groupTotals[g.id] = gt;
    if(g.categoryId === "liability") debt += gt; else equity += gt;
  }
  return {debt, equity, totalAssets:equity, netWorth:equity - debt, groupTotals, missing};
}
function exposures(){
  const missing = new Set();
  const map = new Map();
  const add = (key, name, market, symbol, value, src) => {
    if(!map.has(key)) map.set(key, {key, name, market, symbol, value:0, sources:[]});
    const e = map.get(key); e.value += value; e.sources.push(src);
    if(name && (!e.name || e.name === e.symbol)) e.name = name;
  };
  for(const acc of S.accounts.filter(a => a.kind === "holding")){
    for(const p of S.positions.filter(p => p.accountId === acc.id)){
      const ins = S.instruments.find(i => i.id === p.instrumentId);
      if(!ins) continue;
      const vBase = toBase((Number(p.quantity)||0) * (Number(ins.lastPrice)||0), ins.currency, missing);
      if(vBase === 0) continue;
      if(ins.type === "etf"){
        const cons = S.etf.filter(c => c.etfInstrumentId === ins.id);
        if(cons.length === 0){
          add(ins.id, ins.name + "（ETF，未載入成分）", ins.market, ins.symbol, vBase, {via:acc.name, note:"ETF整檔"});
        }else{
          let wsum = 0;
          for(const c of cons){
            const w = Number(c.weightPct)||0; wsum += w;
            const k = instrKey(c.underlyingMarket || ins.market, c.underlyingSymbol);
            add(k, c.underlyingName || c.underlyingSymbol, c.underlyingMarket || ins.market, c.underlyingSymbol,
                vBase * w / 100, {via:acc.name + " › " + ins.symbol, note:pct1(w)});
          }
          const resid = 100 - wsum;
          if(resid > 0.01) add("RESIDUAL", "其他／現金殘差（ETF成分未涵蓋）", "-", "-", vBase * resid / 100, {via:ins.symbol, note:pct1(resid)});
        }
      }else{
        add(instrKey(ins.market, ins.symbol), ins.name, ins.market, ins.symbol, vBase, {via:acc.name, note:"直接持有"});
      }
    }
  }
  const list = [...map.values()].sort((a,b) => b.value - a.value);
  const denom = list.reduce((s,e) => s + e.value, 0);
  return {list, denom, missing};
}
/* ============ 通用 Modal 表單 ============ */
const dlg = () => $("#dlg");
function openForm(title, fieldsHTML, onSubmit, submitLabel){
  $("#dlgTitle").textContent = title;
  const f = $("#dlgForm");
  f.innerHTML = fieldsHTML + `
    <div class="dlg-actions">
      <button type="button" class="btn" id="dlgCancel">取消</button>
      <button type="submit" class="btn primary">${esc(submitLabel||"儲存")}</button>
    </div>`;
  f.onsubmit = async e => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(f).entries());
    const err = await onSubmit(data);
    if(err){ alert(err); return; }
    dlg().close(); await refresh();
  };
  $("#dlgCancel").onclick = () => dlg().close();
  dlg().showModal();
}
const fld = (label, inner) => `<label>${esc(label)}</label>${inner}`;
const inp = (name, val, attrs) => `<input name="${name}" value="${esc(val ?? "")}" ${attrs||""}>`;
const sel = (name, options, cur) => `<select name="${name}">` +
  options.map(([v,l]) => `<option value="${esc(v)}" ${v===cur?"selected":""}>${esc(l)}</option>`).join("") + `</select>`;

/* ============ 分頁 ============ */
const TABS = [
  ["overview","總覽"],["accounts","帳戶"],["positions","持倉"],["exposure","曝險"],
  ["alloc","配置"],["etf","ETF成分"],["fx","匯率"],["import","匯入"],["settings","設定"]
];
let currentTab = "overview";
function renderTabs(){
  $("#tabs").innerHTML = TABS.map(([id,l]) =>
    `<button data-tab="${id}" class="${id===currentTab?"active":""}">${l}</button>`).join("");
  $("#tabs").querySelectorAll("button").forEach(b => b.onclick = () => { currentTab = b.dataset.tab; refresh(); });
}
async function refresh(){
  if(!S.started){ renderStart(); return; }
  await loadAll(); renderTabs(); updateSaveUI(); VIEWS[currentTab]();
}
function updateSaveUI(){
  const pb = $("#privBtn"); if(pb) pb.style.display = S.started ? "" : "none";
  const b = $("#saveBtn"); if(!b) return;
  b.style.display = S.started ? "" : "none";
  if(S.dirty){ b.textContent = "● 備份（有新變更）"; b.classList.add("dirty"); }
  else{ b.textContent = "備份"; b.classList.remove("dirty"); }
}

function missingBanner(missing){
  if(!missing || missing.size === 0) return "";
  return `<div class="banner">⚠ 以下幣別尚未設定匯率，相關金額<strong>未計入</strong>加總：${[...missing].map(esc).join("、")}。請至「匯率」頁設定。</div>`;
}

/* ============ 總覽 ============ */
function backupBanner(){
  let last = null;
  try{ last = localStorage.getItem(LASTBK_KEY); }catch(e){}
  if(!last) return `<div class="banner">資料會自動存在此瀏覽器，但尚未備份過。建議按右上角「備份」，把文字存一份到備忘錄（鎖定筆記）。</div>`;
  const days = Math.floor((Date.now() - new Date(last).getTime()) / 86400000);
  if(days >= 7) return `<div class="banner">距上次備份已 ${days} 天。瀏覽器資料有被系統清除的可能，建議按右上角「備份」更新。</div>`;
  return "";
}

/* 淨值歷史卡（資料來源：每次儲存資料檔時記錄的快照） */
function netHistoryCard(){
  const snaps = [...(S.snapshots||[])].sort((a,b) => a.date < b.date ? -1 : 1);
  if(snaps.length < 2) return `<div class="card"><h2>淨值歷史</h2>
    <div class="muted">每次按「儲存變更」會記錄當日淨值（同日覆蓋、匯率不齊時跳過）。累積 2 筆以上即顯示曲線，目前 ${snaps.length} 筆。</div></div>`;
  const vs = snaps.map(x => x.net);
  const min = Math.min(...vs), max = Math.max(...vs), span = (max - min) || 1;
  const W = 320, H = 110, P = 10;
  const xs = snaps.map((x,i) => P + i * (W - 2*P) / (snaps.length - 1));
  const ys = vs.map(v => H - P - (v - min) * (H - 2*P) / span);
  const pts = xs.map((x,i) => x.toFixed(1) + "," + ys[i].toFixed(1)).join(" ");
  return `<div class="card"><h2>淨值歷史（${esc(S.settings.baseCurrency)}）</h2>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:560px;display:block" role="img" aria-label="淨值歷史曲線">
      <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2"/>
      ${xs.map((x,i) => `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="2.5" fill="var(--accent)"><title>${esc(snaps[i].date)}：${fmtN(vs[i])}</title></circle>`).join("")}
    </svg>
    <div class="row between muted num"><span>${esc(snaps[0].date)}</span><span>${esc(snaps[snaps.length-1].date)}</span></div>
    <div class="row between muted num"><span>最低 ${fmtN(min)}</span><span>最新 ${fmtN(vs[vs.length-1])}</span><span>最高 ${fmtN(max)}</span></div></div>`;
}

function makeDonut(items, ariaLabel){
  const palette = ["#0f6f6a","#3b7dd8","#c58a1e","#8459b3","#b4421f","#5a8a4a","#c04f7c","#2f8f83","#a8631e","#4a6fb0","#7a9a3a","#9a4f8f"];
  const sum = items.reduce((s,x) => s + x.value, 0);
  if(sum <= 0) return {sum:0, svg:"", legend:""};
  let angle = -90;
  const arcs = items.map((it,i) => {
    const frac = it.value / sum;
    const a0 = angle, a1 = angle + frac * 360; angle = a1;
    const large = (a1 - a0) > 180 ? 1 : 0;
    const pt = a => [60 + 46 * Math.cos(a * Math.PI/180), 60 + 46 * Math.sin(a * Math.PI/180)];
    const [x0,y0] = pt(a0), [x1,y1] = pt(a1 - 0.0001);
    return `<path d="M ${x0} ${y0} A 46 46 0 ${large} 1 ${x1} ${y1}" fill="none" stroke="${it.color || palette[i%palette.length]}" stroke-width="16"/>`;
  }).join("");
  const svg = `<svg width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="${esc(ariaLabel)}">${arcs}</svg>`;
  const legend = `<div class="legend">` + items.map((it,i) =>
    `<div><i style="background:${it.color || palette[i%palette.length]}"></i>${esc(it.name)}
     <span class="muted num">${fmtN(it.value)}（${pct1(it.value/sum*100)}）</span></div>`).join("") + `</div>`;
  return {sum, svg, legend};
}
function stockRegionData(){
  const missing = new Set();
  const b = {TW:0, US:0, EU:0, OTHER:0};
  for(const acc of S.accounts.filter(a => a.kind === "holding")){
    for(const p of S.positions.filter(p => p.accountId === acc.id)){
      const ins = S.instruments.find(i => i.id === p.instrumentId);
      if(!ins) continue;
      const v = toBase((Number(p.quantity)||0) * (Number(ins.lastPrice)||0), ins.currency, missing);
      const key = (ins.market === "TW" || ins.market === "US" || ins.market === "EU") ? ins.market : "OTHER";
      b[key] += v;
    }
  }
  const names = {TW:"台股", US:"美股", EU:"歐股", OTHER:"其他"};
  const colors = {TW:"#b4421f", US:"#3b7dd8", EU:"#5a8a4a", OTHER:"#7a7f87"};
  return Object.keys(b).filter(k => b[k] > 0).map(k => ({name:names[k], value:b[k], color:colors[k]}));
}

function twTopHoldings(n){
  const ex = exposures();                       // 與「曝險」頁相同的 look-through 計算
  const tw = ex.list.filter(e => e.market === "TW");  // 已按金額由大到小排序
  const total = tw.reduce((s,e) => s + e.value, 0);
  const items = tw.slice(0, n).map(e => ({name:(e.symbol + " " + (e.name || "")).trim(), value:e.value}));
  const restVal = tw.slice(n).reduce((s,e) => s + e.value, 0);
  if(restVal > 0) items.push({name:"其他台股", value:restVal, color:"#9aa0a6"});
  return {items, total, count:tw.length};
}

function transactionForm(acc, instrumentId, tx){

  openForm(tx ? "編輯交易" : "新增交易",

    fld("市場", sel("market", MARKETS.map(m=>[m,m]), ins?.market || (acc.currency==="USD"?"US":acc.currency==="EUR"?"EU":"TW"))) +
    fld("名稱", inp("iname", ins?.name)) +
    fld("類型", sel("itype", INSTR_TYPES, ins?.type || "stock")) +
    fld("計價幣別", inp("icur", ins?.currency || acc.currency, "maxlength=8 style='text-transform:uppercase'")) +
    fld("買賣別", sel("side", [["buy","買入"],["sell","賣出"]], tx?.side || "buy")) +
    fld("股數", inp("quantity", tx?.quantity, "inputmode='decimal'")) +
    fld("成交價（每股，原幣，選填）", inp("price", tx?.price, "inputmode='decimal'")) +
    fld("日期", inp("date", tx?.date || todayStr(), "type='date'")) +
    fld("備註（可記錄當時決策）", inp("note", tx?.note)),
    async d => {
      if(!d.symbol.trim()) return "請填代號";
      if(!d.icur.trim()) return "請填計價幣別";
      const q = parseFloat(d.quantity);
      if(isNaN(q) || q <= 0) return "請填股數（正數）";
      if(!d.date) return "請填日期";
      const key = instrKey(d.market, d.symbol);
      let instrument = S.instruments.find(i => i.id === key);
      const priceIn = (d.price === "" || d.price === undefined) ? null : parseFloat(d.price);
      const hasPrice = priceIn !== null && !isNaN(priceIn);
      if(!instrument){
        instrument = {id:key, symbol:d.symbol.toUpperCase().trim(), market:d.market,
          name:d.iname.trim() || d.symbol.toUpperCase().trim(), type:d.itype, currency:d.icur.toUpperCase().trim(),
          lastPrice: hasPrice ? priceIn : 0, lastPriceDate: hasPrice ? todayStr() : "", priceSource:"manual"};
      }else{
        instrument = {...instrument, symbol:d.symbol.toUpperCase().trim(), market:d.market,
          name:d.iname.trim() || instrument.name, type:d.itype, currency:d.icur.toUpperCase().trim()};
        // 不覆蓋現價（現價由「貼上更新」或既有資料維護）
      }
      await dbPut("instruments", instrument);
      const base = {accountId:acc.id, instrumentId:key, side:d.side, quantity:q, price:hasPrice?priceIn:0, date:d.date, note:(d.note||"").trim()};
      await putTx(tx ? {...tx, ...base} : {id:uid(), ...base});
      txExpand = key;
    });
}

/* ============ CSV 解析（支援引號、逗號、CRLF） ============ */
function parseCSV(text){
  const rows = []; let row = [], cell = "", q = false;
  text = text.replace(/^\uFEFF/, "");
  const firstLine = text.split(/\r?\n/, 1)[0] || "";
  const delim = firstLine.includes("\t") ? "\t" : ","; // 標題列含 tab 視為 Excel 貼上
  for(let i = 0; i < text.length; i++){
    const ch = text[i];
    if(q){
      if(ch === '"'){ if(text[i+1] === '"'){ cell += '"'; i++; } else q = false; }
      else cell += ch;
    }else if(ch === '"') q = true;
    else if(ch === delim){ row.push(cell); cell = ""; }
    else if(ch === "\n" || ch === "\r"){
      if(ch === "\r" && text[i+1] === "\n") i++;
      row.push(cell); cell = "";
      if(row.some(c => c.trim() !== "")) rows.push(row);
      row = [];
    }else cell += ch;
  }
  if(cell !== "" || row.length){ row.push(cell); if(row.some(c => c.trim() !== "")) rows.push(row); }
  return rows;
}
function downloadText(filename, text, mime){
  const isCsv = !mime || mime === "text/csv";
  const blob = new Blob([isCsv ? "\uFEFF" + text : text], {type:(mime||"text/csv") + ";charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

    sample:['2330,TW,25,', 'AAPL,US,10,含透過ETF間接持有'],
    validate(r){
      const e = {};
      if(!r["代號"]) e["代號"] = "必填";
      if(!MARKETS.includes((r["市場"]||"").toUpperCase())) e["市場"] = "需為 " + MARKETS.join("/");
      const p = num(r["目標百分比"]);
      if(p === null || p < 0 || p > 100) e["目標百分比"] = "需為 0–100 數字";
      return e;
    },
    async commit(rows){
      for(const r of rows){
        const sym = r["代號"].toUpperCase().trim(), mkt = r["市場"].toUpperCase();
        await dbPut("targets", {id:instrKey(mkt, sym), symbol:sym, market:mkt, targetPct:num(r["目標百分比"]), note:r["備註"]||"", updatedAt:todayStr()});
      }
      return rows.length;
    }
  }
};

function doParse(text){
  const def = IMPORTS[importType];
  const raw = parseCSV(text);
  if(raw.length < 2){ $("#impResult").innerHTML = `<div class="banner">資料不足：需要標題列＋至少一筆資料。</div>`; return; }
  const header = raw[0].map(h => h.trim());
  const missing = def.headers.filter(h => !header.includes(h));
  if(missing.length){ $("#impResult").innerHTML = `<div class="banner">缺少欄位：${missing.map(esc).join("、")}。請使用範本的標題列。</div>`; return; }
  const rows = raw.slice(1).map(cells => {
    const r = {};
    header.forEach((h,i) => r[h] = (cells[i] ?? "").trim());
    return {data:r, errors:def.validate(r)};
  });
  const errN = rows.filter(r => Object.keys(r.errors).length).length;
  importParsed = rows;
  $("#impResult").innerHTML = `
    <div class="banner ${errN ? "" : "ok"}" style="margin-top:12px">
      共 ${rows.length} 筆，${errN ? `其中 <strong>${errN} 筆有錯誤</strong>（標紅），需修正後重新解析才能匯入。` : "全部通過檢查。"}</div>
    <div class="import-preview"><table>
      <tr><th>#</th>${def.headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr>
      ${rows.map((r,i) => `<tr><td class="num">${i+1}</td>${def.headers.map(h => {
        const err = r.errors[h];
        return `<td class="${err ? "err-cell" : ""}">${esc(r.data[h])}${err ? `<div style="font-size:.68rem">${esc(err)}</div>` : ""}</td>`;
      }).join("")}</tr>`).join("")}
    </table></div>
    ${errN === 0 ? `<div style="margin-top:10px"><button class="btn primary" id="impCommit">確認匯入 ${rows.length} 筆</button></div>` : ""}`;
  const btn = $("#impCommit");
  if(btn) btn.onclick = async () => {
    const n = await IMPORTS[importType].commit(importParsed.map(r => r.data));
    importParsed = null;
    alert(`已匯入 ${n} 筆（${IMPORTS[importType].label}）。`);
    await refresh();
  };
}

function readJSONFile(file, cb){
  const rd = new FileReader();
  rd.onload = () => {
    try{ cb(null, JSON.parse(String(rd.result).replace(/^\uFEFF/, ""))); }
    catch(err){ cb(err); }
  };
  rd.onerror = () => cb(rd.error || new Error("讀檔失敗"));
  rd.readAsText(file, "utf-8");
}
function loadFromFile(file){
  readJSONFile(file, (err, d) => {
    if(!err){ try{ deserializeAll(d); }catch(e){ err = e; } }
    if(err){ alert("載入失敗：" + err.message); return; }
    S.started = true; S.dirty = false; S.loadedFileName = file.name;
    try{ localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(serializeAll())); }catch(e){}
    currentTab = "overview"; refresh();
  });
}

/* ============ 台股收盤價自動更新（證交所 OpenAPI STOCK_DAY_ALL） ============ */
const TWSE_URL = "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL";
const TWSE_FETCH_KEY = "asset_tracker_twse_fetch_v1";
let twseAutoTried = false;

// 共用：把 {代號:收盤價} 套用到持有的台股標的（貼上更新、未來 proxy 都用）
function applyCloseMap(map, source){
  let updated = 0; const notFound = [];
  for(const ins of S.instruments){
    if(ins.market !== "TW") continue;
    if(!S.positions.some(p => p.instrumentId === ins.id)) continue; // 只更新有持倉的
    const v = map[String(ins.symbol).trim().toUpperCase()];
    if(v !== undefined && isFinite(v) && v > 0){ ins.lastPrice = v; ins.lastPriceDate = todayStr(); ins.priceSource = source || "csv"; updated++; }
    else notFound.push(ins.symbol);
  }
  if(updated) markDirty();
  return {updated, notFound};
}
function applyTwseCloses(rows){
  const map = {};
  for(const r of rows){
    if(!r || r.Code == null) continue;
    const v = parseFloat(String(r.ClosingPrice).replace(/,/g, ""));
    if(isFinite(v) && v > 0) map[String(r.Code).trim().toUpperCase()] = v;
  }
  return applyCloseMap(map, "twse");
}

// 解析貼上的台股收盤價文字：辨識「代號」「收盤價」欄位，容忍多餘欄位
function parsePriceText(text){
  const rows = parseCSV(text);
  if(!rows.length) return {map:{}, count:0, needHeader:false, empty:true};
  const header = rows[0].map(h => String(h).trim());
  const findIdx = kws => header.findIndex(h => kws.some(k => h.toLowerCase().includes(k)));
  let codeIdx = findIdx(["代號","code"]);
  let priceIdx = findIdx(["收盤","close"]);
  let start = 0;
  const maxCols = rows.reduce((m,r) => Math.max(m, r.length), 0);
  if(codeIdx >= 0 && priceIdx >= 0){ start = 1; }
  else if(maxCols <= 2){ codeIdx = 0; priceIdx = 1; }   // 兩欄：代號,收盤價
  else return {map:{}, count:0, needHeader:true };      // 多欄又無標題 → 請包含標題列
  const map = {}; let count = 0;
  for(let i = start; i < rows.length; i++){
    const cells = rows[i];
    let code = String(cells[codeIdx] ?? "").trim().toUpperCase().replace(/^="?|"?$/g, "");
    const price = parseFloat(String(cells[priceIdx] ?? "").replace(/,/g, "").replace(/[^0-9.\-]/g, ""));
    if(!/^\d{3,6}[A-Z]?$/.test(code)) continue;         // 過濾標題/雜訊列
    if(isFinite(price) && price > 0){ map[code] = price; count++; }
  }
  return {map, count, needHeader:false};
}

async function fetchTwseCloses(){
  const res = await fetch(TWSE_URL, {cache:"no-store"});
  if(!res.ok) throw new Error("HTTP " + res.status);
  const rows = await res.json();
  if(!Array.isArray(rows)) throw new Error("回傳格式非預期（非陣列）");
  return applyTwseCloses(rows);
}

// 開啟即抓：每次開啟嘗試一次，失敗則靜默（手動鈕會顯示錯誤）
function maybeAutoFetchTwse(){
  if(twseAutoTried) return;
  if(!S.settings || S.settings.autoFetchTwse === false) return;
  let last = null;
  try{ last = localStorage.getItem(TWSE_FETCH_KEY); }catch(e){}
  if(last === todayStr()) return; // 今天已成功抓過就不重抓
  const hasTw = S.instruments.some(ins => ins.market === "TW" && S.positions.some(p => p.instrumentId === ins.id));
  if(!hasTw) return;
  twseAutoTried = true;
  fetchTwseCloses().then(r => {
    try{ localStorage.setItem(TWSE_FETCH_KEY, todayStr()); }catch(e){}
    if(r.updated) refresh();
  }).catch(() => { /* 自動抓取失敗靜默處理 */ });
}

      <div class="row">
        <button class="btn primary" id="expNow">立即備份（下載或顯示文字）</button>
        <label class="btn" style="cursor:pointer">載入其他資料檔<input type="file" id="loadOther" accept=".json,application/json" style="display:none"></label>
        <button class="btn" id="txtIn">貼上文字載入</button>
      </div>
      <div class="muted" style="margin-top:8px">資料檔為明文 JSON，請妥善保管。載入其他檔會<strong>完全取代</strong>目前畫面上的資料。</div></div>
    <div class="card"><h2>重設</h2>
      <button class="btn danger" id="wipeAll">清空目前資料並重新開始</button>
      <div class="muted" style="margin-top:6px">只影響畫面與臨時快取，不會刪除你已存在「檔案」App 裡的資料檔。</div></div>`;
  $("#saveSet").onclick = async () => {
    const base = $("#setBase").value.toUpperCase().trim();
    const th = parseFloat($("#setTh").value);
    if(!/^[A-Z]{3,8}$/.test(base)){ alert("基準幣別需為 ISO 代碼"); return; }
    if(isNaN(th) || th < 0){ alert("門檻需為非負數字"); return; }
    if(base !== st.baseCurrency && !confirm(`確定將基準幣別改為 ${base}？所有匯率須重新輸入。`)) return;
    await dbPut("settings", {...st, baseCurrency:base, thresholdPct:th});
    if(base !== st.baseCurrency) await dbPut("fxRates", {id:base, rateToBase:1, updatedAt:todayStr()});
    await refresh(); alert("已更新並自動儲存。");
  };
  $("#expNow").onclick = doSave;
  $("#txtIn").onclick = () => {
    $("#dlgTitle").textContent = "貼上資料文字載入";
    const f = $("#dlgForm");
    f.innerHTML = `<textarea class="paste" id="tiTa" style="min-height:170px" placeholder="貼上先前複製保存的資料文字（JSON）"></textarea>
      <div class="muted" style="margin-top:4px">載入會完全取代目前畫面上的資料。</div>
      <div class="dlg-actions"><button type="button" class="btn" id="tiCancel">取消</button>
      <button type="button" class="btn primary" id="tiGo">載入</button></div>`;
    f.onsubmit = e => e.preventDefault();
    $("#tiCancel").onclick = () => dlg().close();
    $("#tiGo").onclick = () => {
      if(S.dirty && !confirm("目前有未儲存的變更，載入將會遺失。繼續？")) return;
      if(loadFromText($("#tiTa").value)) dlg().close();
    };
    dlg().showModal();
  };
  $("#loadOther").onchange = e => {
    if(!e.target.files[0]) return;
    if(S.dirty && !confirm("目前有未儲存的變更，載入其他檔將會遺失這些變更。繼續？")){ e.target.value = ""; return; }
    loadFromFile(e.target.files[0]);
  };
  $("#wipeAll").onclick = async () => {
    if(!confirm("確定清空目前畫面上的資料？未儲存的變更將遺失。")) return;
    try{ localStorage.removeItem(SNAPSHOT_KEY); }catch(e){}
    S.started = false; S.dirty = false; S.loadedFileName = null;
    renderStart();
  };
}

/* ============ 初始化 ============ */
const VIEWS = {overview:vOverview, accounts:vAccounts, positions:vPositions, exposure:vExposure,
  alloc:vAlloc, etf:vEtf, fx:vFx, import:vImport, settings:vSettings};

document.getElementById("saveBtn").onclick = doSave;
document.getElementById("privBtn").onclick = () => {
  PRIVACY = !PRIVACY;
  document.body.classList.toggle("privacy", PRIVACY);
  document.getElementById("privBtn").textContent = PRIVACY ? "顯示金額" : "遮住金額";
  refresh();
};
(function boot(){
  if(navigator.storage && navigator.storage.persist){
    navigator.storage.persist().then(p => { S.persisted = p; }).catch(() => { S.persisted = null; });
  }
  let snap = null;
  try{ const raw = localStorage.getItem(SNAPSHOT_KEY); if(raw) snap = JSON.parse(raw); }catch(e){ snap = null; }
  if(snap){
    try{
      deserializeAll(snap);
      S.started = true; S.dirty = false; S.loadedFileName = "（本機自動儲存）";
      refresh(); return;
    }catch(e){ /* 快取損毀則回到起始畫面 */ }
  }
  renderStart();
})();

</script>
</body>
